<div class="app-header">
  @if (!editMode) {
    <h1>Bienvenue au <span [innerHTML]= "title"></span></h1>
  } @else {
    <editor [(ngModel)]="title" [init]= "editorConfig"></editor>
  }
</div>
<hr>

<nav class="navbar navbar-expand-lg navbar-dark">
  <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav"
    aria-expanded="false" aria-label="Toggle navigation">
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse" id="navbarNav">
    <ul class="navbar-nav">
      <li class="nav-item active">
        <a class="nav-link" routerLinkActive="active" routerLink="vaisseaux">Vaisseaux</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" routerLinkActive="active" routerLink="auth">Authentification</a>
      </li>
       <li class="nav-item">
            <a class="nav-link" routerLinkActive="active" routerLink="edit">Nouveau vaisseau</a>
          </li>
      <li class="nav-item">
        <a class="nav-link" routerLinkActive="active" routerLink="panier">Panier</a>
      </li>
      <li class="nav-item ms-3">
        <button class="btn btn-sm" [class.btn-outline-warning]="!editMode" [class.btn-success]="editMode"
          (click)= "editMode = !editMode">
          {{ editMode ? 'Terminer' : 'Modifier le site' }}
        </button>
      </li>
    </ul>
  </div>
</nav>

<hr>

<div class="container-fluid">
  <div class="row">
    <div class="col">
      <router-outlet></router-outlet>
      <!--<app-vaisseau-view></app-vaisseau-view>-->
    </div>
    <div class="side-banner" style="background-image: url('img/EmpireLogo.jpg')"></div>
  </div>
</div>
