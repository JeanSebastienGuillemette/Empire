@if (!editMode){
<h2><span [innerHTML]= "pageTitle"></span></h2>
} @else {
<editor [(ngModel)]= "pageTitle" [init]= "editorConfig"></editor>
}
<button (click)= "editMode = !editMode">
  {{editMode ? 'Terminer' : 'Modifier'}}
</button>
<p>Dernière mise à jour: {{lastUpdate | async}}</p>

<ul class="list-group">

  @for (item of vaisseaux; track item.name; let i = $index) {

  <app-vaisseau-models [vaisseauNom]=item.name [vaisseauStatus]=item.status [indexDesVaisseaux]="i" [id]="item.id">
  </app-vaisseau-models> }

</ul>

<div class="btn-group-actions">
  <button class="btn btn-success" [disabled]= "!isAuth" (click)="onAllumer()">Tous disponible</button>
  <button class="btn btn-danger" [disabled]= "!isAuth" (click)="onFermer()">Tous non disponible</button>
  <button class="btn btn-primary" (click)="onSave()">Enregistrer</button>
  <button class="btn btn-primary" (click)="onFetch()">Récupérer</button>
</div>
